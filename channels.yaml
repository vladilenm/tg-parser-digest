# Список публичных Telegram-каналов российского нефтегаза/нефтехимии.
# User-аккаунт из TG_SESSION ОБЯЗАН быть подписан на каждый из них —
# иначе GramJS бросит ChannelPrivateError (этот канал будет пропущен).
# Поле priority зарезервировано (не используется в MVP).
#
# PLACEHOLDER_NN-записи (priority: 5) — стабы для SCALE-01. Оператор заменяет
# каждую на реальный username публичного канала нефтегаза РФ перед первым
# 20:00-прогоном. Если не заменить — канал просто пометится skipped
# (UsernameNotOccupiedError/UsernameInvalidError), прогон продолжится.

